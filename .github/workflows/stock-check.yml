name: Hisse Takip

on:
  schedule:
    # BIST saatleri (TR saatiyle 10:00-18:10, UTC+3) -> UTC 07:00-15:10
    # Hafta içi (Pazartesi-Cuma), her 15 dakikada bir
    - cron: "*/15 7-15 * * 1-5"
  workflow_dispatch: {}  # Actions sekmesinden elle tetiklemek için

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bağımlılıkları kur
        run: pip install -r requirements.txt

      - name: Hisseleri kontrol et
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python src/stock_check.py
