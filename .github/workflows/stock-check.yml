name: Hisse Takip

on:
  schedule:
    # Kapanışa yakın (TR saatiyle ~18:05, UTC+3) -> UTC 15:05
    # Hafta içi (Pazartesi-Cuma), günde bir kez
    - cron: "5 15 * * 1-5"
  workflow_dispatch: {}  # Actions sekmesinden elle tetiklemek için

permissions:
  contents: write  # state.json'u repoya geri commit'leyebilmek için gerekli

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bağımlılıkları kur
        run: pip install -r requirements.txt

      - name: Hisseleri kontrol et
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python src/stock_check.py

      - name: state.json değişikliğini kaydet
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "chore: tavan serisi durumu güncellendi"
          git push
